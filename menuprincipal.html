<!DOCTYPE html>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido a AWAQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4eedc;
      height: 100vh;
      display: flex;
    }
    h2 {
            font-family: 'Grotesk';
            font-weight: bold;
            color: #375040;
          }
    .sidebar {
      width: 60px;
      background-color: #364c3e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: width 0.3s;
    }

    .sidebar:hover {
      width: 200px;
    }

    .menu-item {
      width: 100%;
      color: white;
      display: flex;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .menu-item:hover {
      background-color: #2b3a31;
    }

    .menu-item i {
      font-size: 24px;
      margin-right: 10px;
    }

    .menu-item span {
      display: none;
      font-size: 18px;
    }

    .sidebar:hover .menu-item span {
      display: inline;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #364c3e;
      padding-bottom: 100px; 
    }

    .search-box {
      width: 300px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      margin-top: -250px;
    }
  </style>
</head>
<body>
  <div class="sidebar"></div>
  <div class="main-content">
    <div style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%);">
      <img src="AWAQ.png" alt="Logo de AWAQ" style="height: 500px; margin-top: -200px; margin-left: 50px;">
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
    </div>
    <h2>Bienvenido a AWAQ</h2>
    <form class="d-flex search-box" role="search" style="border-radius: 50px; overflow: hidden;">
      <input class="form-control rounded-start" type="search" aria-label="Search">
      <button class="btn btn-secondary rounded-end" type="submit">
        <i class="bi bi-search"></i>
      </button>
    </form>
  </div>
</body>
</html>

<div class="sidebar" style="position: fixed; left: 0;">
    <div class="menu-item">
        <i class="bi bi-house"></i><span>Dashboard</span>
    </div>
    <div class="menu-item">
        <i class="bi bi-chat"></i><span>Chatbot</span>
    </div>
