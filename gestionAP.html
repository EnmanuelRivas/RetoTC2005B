<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard AWAQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #f4eedc;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      background-color: #364c3e;
      color: white;
      padding-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding-left: 30px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      font-size: 18px;
      gap: 15px;
      cursor: pointer;
    }

    .menu-item i {
      font-size: 22px;
    }

    .main-content {
      flex: 1;
      padding: 40px;
    }

    
  </style>  
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="menu-item"><i class="bi bi-boxes"></i>General</div>
    <div class="menu-item"><i class="bi bi-emoji-smile"></i> Gestión de usuarios</div>
    <div class="menu-item"><i class="bi bi-layers"></i> <strong>Gestión de anteproyectos</strong></div>
    <div class="menu-item"><i class="bi bi-house-door"></i> Regresar al inicio</div>
    <div class="menu-item"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</div>
  </div>

  <div class="main-content">
    
  </div>

</body>
</html>
